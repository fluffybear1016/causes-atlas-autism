# Phase 0D: genetic_id_aliases.csv candidates — variant ↔ atlas gene mapping
# Per spec §2.21 — maps rsID / CNV region / mtDNA position / HGVS to atlas
# GEN-XXXX. Each row references a foundational paper for the variant's
# clinical relevance, PubMed-verified by seed_with_verification.py before
# write.
#
# atlas_gene_id values: GEN-XXXX where atlas already has the gene; "pending"
# where the gene needs to be added to genes.csv (curator follow-up).

