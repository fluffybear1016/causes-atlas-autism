# Phase 0G proof-of-concept candidates: cortisol state-conditional reference ranges
#
# Each row cites a methodology / reference-range source paper that is
# PubMed-verified by seed_with_verification.py before write.
#
# IMPORTANT (verify-before-write protocol per spec §24):
# - Numerical reference_low / reference_high values below are drawn from
#   clinical-lab convention + the cited methodology paper. Where exact
#   numbers cannot be confirmed directly from the cited paper without
#   full-text access, the row is marked with `needs_clinical_lab_confirmation`
#   in notes — the methodology citation is verified, but a clinician should
#   confirm the specific cutoff against the underlying paper or against
#   their preferred clinical lab's reference interval.
# - Cortisol BIO IDs in the atlas: BIO-0115 (DUTCH composite), BIO-0175 (CAR).
# - Cortisol rows here target BIO-0175 (Salivary CAR) since it has the
#   most direct PMID-grounded methodology consensus (Stalder 2016/2022).

# Row 1: CAR baseline — first morning sample, post-wake supine
- row_id: PSN-CORT-001
  claimed_pmid: 26563991
  claimed_first_author: Stalder
  claimed_year: 2016
  claimed_key_terms: [cortisol, awakening]
  claimed_journal_substring: Psychoneuroendocrinology
  row_data:
    biomarker_id: BIO-0175
    reference_range_dimension: time_of_day
    dimension_value: post_wake_t0_supine
    reference_low: 5.0
    reference_high: 25.0
    reference_unit: nmol/L
    reference_lab_method: salivary_LC_MS_or_immunoassay
    z_score_correction_factor: 1.0
    credal_low: 4.0
    credal_high: 30.0
    primary_pmid: 26563991
    notes: "Stalder 2016 CAR expert consensus methodology; baseline sample taken in supine position immediately upon waking before getting out of bed. Numerical cutoffs are conservative central range; needs_clinical_lab_confirmation against specific assay manufacturer reference."

