# Phase 0E: pgx_drug_gene_table.csv candidates — CPIC-grounded
# Per spec §3.8 — drug × gene × metabolizer-phenotype rows.
# Each row cites a CPIC (Clinical Pharmacogenetics Implementation
# Consortium) guideline PMID, PubMed-verified by seed_with_verification.py
# before write.
#
# IMPORTANT: per audit H-5 / iatrogenic_exposure_priors §3.13c, SSRIs
# are NOT autism core-feature interventions. PGx rows for SSRIs apply
# when SSRIs are prescribed for non-autism indications (severe OCD,
# depression, anxiety) in autistic individuals — to inform safety,
# not to recommend SSRIs as autism treatment.

