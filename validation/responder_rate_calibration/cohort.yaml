deliverables:
  v0.1: |
    Scaffold + 2 worked entries with verified PMIDs (current state).
  v0.2_target_month_3: |
    30 entries with full-text-extracted responder rates. compute_responder_mae.py
    produces a single-number cohort MAE and per-entry abs error.
  v1.0_target_month_5: |
    Preprint draft submitted to Patterns / npj Digital Medicine / Cell Reports
    Medicine. Blinded re-extraction of 5 entries by a sub-agent for
    methodology audit.
