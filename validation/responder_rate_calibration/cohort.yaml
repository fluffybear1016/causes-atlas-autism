# Responder-rate calibration cohort manifest
# Move 2 of the post-mortem fix plan
#
# Each entry MUST cite a PubMed-verified PMID for an RCT or stratified
# observational study. Responder rates are extracted from the published
# paper (abstract + figures + tables); fields tagged `<extract from paper>`
# are placeholders pending the full-text extraction pass.

cohort_version: v0.1_scaffold
engine_version_required: session4_v0.2.0_profile_vector
verification_protocol: BioMysteryBench-aligned (CLAUDE.md §Verification protocol)

entries:
  - entry_id: rrc_001_frye_2018_leucovorin_fraa
    rct_pmid: 27752075
    rct_first_author: Frye RE
    rct_year: 2018
    rct_journal: Mol Psychiatry
    rct_title: |
      Folinic acid improves verbal communication in children with autism
      and language impairment: a randomized double-blind placebo-controlled
      trial.
    pmid_verified: true
    pmid_verified_at: 2026-05-05

    intervention_id: INT-0001
    intervention_name: Leucovorin (folinic acid)
    target_phenotype_id: PHE-0001  # cerebral folate deficiency

    stratification_criterion: FRAA-positive (folate receptor alpha autoantibody)
    stratifier_biomarker: serum_folate_receptor_alpha_autoantibody
    stratifier_threshold: positive (binding-type ≥ baseline as defined in paper)

    # Responder rate fields — extract from paper full-text
    n_total_in_stratum: <extract from paper>
    n_responder_in_stratum: <extract from paper>
    published_responder_rate: <extract from paper>
    placebo_responder_rate: <extract from paper>
    response_minus_placebo: <derived>

    responder_definition: |
      Improvement on Communication Domain of Vineland Adaptive Behavior
      Scales-II + clinical global impression scale; FRAA-stratified analysis.

    representative_input_profile_path: representative_inputs/rrc_001.json
    expected_engine_behavior:
      intervention_in_top_5: true
      intervention_rank_max: 1
      primary_target_dimension: PHE-0001
      profile_dominant_dimensions_must_include: [PHE-0001]

    status: scaffold
    notes: |
      The atlas's case_015_frye_fraa_responder calibration case already maps
      to this PMID; the responder-rate validation is the natural extension.
      Engine currently ranks INT-0001 #1 for representative FRAA-positive
      profile (verified in v0.2 cohort).

  - entry_id: rrc_002_lemonnier_2017_bumetanide
    rct_pmid: 28291262
    rct_first_author: Lemonnier E
    rct_year: 2017
    rct_journal: Transl Psychiatry
    rct_title: |
      Effects of bumetanide on neurobehavioral function in children and
      adolescents with autism spectrum disorders.
    pmid_verified: true
    pmid_verified_at: 2026-05-05

    intervention_id: INT-0023  # placeholder — confirm bumetanide INT id
    intervention_name: Bumetanide
    target_phenotype_id: PHE-0007  # GABA / Cl⁻ imbalance

    stratification_criterion: |
      Phase 2/3 cohort — atlas-tagged subgroup of high-baseline-intracellular-
      Cl⁻ neonates / children. Lemonnier's later analyses show responder-
      enriched effects in this subgroup; population-average response in
      Phase 3 was modest. Engine should encode this stratification.
    stratifier_biomarker: csf_or_neuronal_intracellular_chloride_proxy
    stratifier_threshold: <to be defined; placeholder>

    n_total_in_stratum: <extract from paper>
    n_responder_in_stratum: <extract from paper>
    published_responder_rate: <extract from paper>
    placebo_responder_rate: <extract from paper>

    responder_definition: |
      CGI-I-rated improvement at end-of-trial; SRS reduction ≥ minimum
      clinically important difference. Definition per paper.

    representative_input_profile_path: representative_inputs/rrc_002.json
    expected_engine_behavior:
      # KNOWN ENGINE GAP (v0.2): PHE-0007 (GABA / Cl⁻ imbalance) has no
      # hardcoded biomarker→phenotype shift in collect_biomarker_shifts()
      # because the published-CSF-Cl-proxy biomarker workflow is not yet
      # standardized. The structural assertions below are therefore
      # currently unsatisfiable; engine refactor required first. v0.3
      # roadmap: add a CSF-Cl-proxy + KCC2-dysfunction biomarker→PHE-0007
      # shift, and migrate biomarker shifts from hardcoded to atlas-driven
      # via biomarker_phenotype_edges.csv.
      intervention_in_top_5: true
      primary_target_dimension: PHE-0007
      profile_dominant_dimensions_must_include: [PHE-0007]
      _expected_to_fail_until_engine_v03: true

    status: scaffold_engine_gap
    notes: |
      Lemonnier 2017 Translational Psychiatry is the well-known phase 2/3
      bumetanide trial. Subsequent stratification work (e.g., Hadjikhani 2018
      eye-contact subset) supports a responder-enriched subgroup. Engine
      should match high-Cl⁻ profiles to bumetanide preferentially.

