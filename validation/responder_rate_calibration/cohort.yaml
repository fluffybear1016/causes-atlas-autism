    RCT [ref 125, PMID 19284641] showed effect sizes 0.55-1.00 favoring HBOT; Granpeesheh
    2010 [ref 120] showed no significant changes. Rossignol 2012 explicitly hypothesizes that
    ''the variability in results between studies could also have been due to certain subgroups
    of children with ASD responding differently to HBOT'' (p9), specifically children with
    abnormal cytokines, higher inflammatory markers, cerebral hypoperfusion, or mitochondrial
    dysfunction. This is the responder-stratification claim. Because the review does not publish
    a dichotomized stratum responder rate, this entry is EXCLUDED from cohort responder-rate
    MAE computation. The representative input profile (rrc_010.json) encodes the mito-vulnerable
    + neuroinflammatory subset claim qualitatively for engine structural-test purposes only.
